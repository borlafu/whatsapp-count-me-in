name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/whatsapp-count-me-in
            git pull origin main
            npm install
            npm run build
            pm2 reload ecosystem.config.cjs --update-env

      - name: Comment on Merged PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list \
            --state merged \
            --limit 1 \
            --search "${{ github.sha }}" \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            gh pr comment $PR_NUMBER --body "🚀 **Automatic Deployment Successful!** 

            The changes from this PR have been successfully deployed to the Oracle VM and the PM2 process has been reloaded."
          else
            echo "No merged PR found for this commit."
          fi
