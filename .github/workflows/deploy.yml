name: Continuous Deployment

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/whatsapp-count-me-in
            git pull origin main
            npm install
            npm run build
            pm2 reload ecosystem.config.cjs --update-env

      - name: Comment on Merged PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;

            // Find the PRs associated with this commit
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const prs = result.data;

            if (prs.length > 0) {
              const prNumber = prs[0].number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: "🚀 **Automatic Deployment Successful!**\n\nThe changes from this PR have been successfully deployed to the Oracle VM and the PM2 process has been reloaded."
              });
              console.log(`Comment posted to PR #${prNumber}`);
            } else {
              console.log("No associated PR found for this commit.");
            }
